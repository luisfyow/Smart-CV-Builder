<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurricAI - Gerador de Currículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>CurricAI</h1>
    <p>Crie currículos profissionais com modelos e IA</p>
</header>

<main class="container">

    <section class="formulario">
        <h2>Dados do currículo</h2>

        <label for="foto" class="upload-foto">+ Adicionar foto de perfil</label>
        <input type="file" id="foto" accept="image/*" hidden>

        <input type="text" id="nome" placeholder="Seu nome completo">

        <input list="areas" id="cargo" placeholder="Área desejada. Ex: Desenvolvedor Front-End">

        <datalist id="areas">
            <option value="Desenvolvedor Front-End">
            <option value="Desenvolvedor Back-End">
            <option value="Desenvolvedor Full Stack">
            <option value="Programador C">
            <option value="Programador Python">
            <option value="Analista de Sistemas">
            <option value="Estudante de ADS">
            <option value="Técnico em Informática">
            <option value="Suporte Técnico">
            <option value="Designer Gráfico">
            <option value="UI/UX Designer">
            <option value="Social Media">
            <option value="Marketing Digital">
            <option value="Vendedor">
            <option value="Atendente">
            <option value="Operador de Caixa">
            <option value="Auxiliar Administrativo">
            <option value="Eletricista">
            <option value="Mecânico">
            <option value="Professor">
            <option value="Garçom">
            <option value="Cozinheiro">
            <option value="Motorista">
            <option value="Segurança">
            <option value="Jovem Aprendiz">
            <option value="Estagiário">
        </datalist>

        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="text" id="telefone" placeholder="Seu telefone">
        <input type="text" id="cidade" placeholder="Sua cidade">

        <select id="modelo">
            <option value="moderno">Modelo Moderno</option>
            <option value="minimalista">Modelo Minimalista</option>
            <option value="corporativo">Modelo Corporativo</option>
            <option value="tech">Modelo Tech</option>
            <option value="elegante">Modelo Elegante</option>
        </select>

        <textarea id="sobre" placeholder="Resumo profissional"></textarea>
        <textarea id="experiencia" placeholder="Experiências profissionais"></textarea>
        <textarea id="habilidades" placeholder="Habilidades"></textarea>
        <textarea id="cursos" placeholder="Cursos e formação"></textarea>

        <button onclick="melhorarTexto()">Melhorar com IA</button>
        <button onclick="gerarCurriculo()">Atualizar Currículo</button>
        <button onclick="baixarPDF()">Baixar / Imprimir PDF</button>
    </section>

    <section class="preview-area">
        <div id="curriculo" class="curriculo moderno">
            <h2>Seu currículo aparecerá aqui</h2>
            <p>Preencha os dados ao lado para gerar a prévia.</p>
        </div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
